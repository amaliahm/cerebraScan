<!doctype html>
<html lang="en">
  <head>
    <!--
      SEO + social: meta/OG/Twitter/JSON-LD for crawlers; no server rendering.
      Runtime “API”: none — URLs and copy are static. Update canonical + og:url if you change domain.
    -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CerebraScan</title>
    <meta name="theme-color" content="#13746a" />
    <link rel="canonical" href="https://cerebra-scan.vercel.app/" />
    <link rel="author" href="https://aminaghandouz.vercel.app" />
    <link rel="me" href="mailto:a.ghandouz@esi-sba.dz" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebPage",
        "name": "CerebraScan",
        "url": "https://cerebra-scan.vercel.app/",
        "description": "CerebraScan",
        "inLanguage": "en",
        "isPartOf": {
          "@type": "WebSite",
          "name": "CerebraScan",
          "url": "https://cerebra-scan.vercel.app/"
        },
        "author": {
          "@type": "Person",
          "name": "Amina Ghandouz",
          "url": "https://aminaghandouz.vercel.app",
          "email": "a.ghandouz@esi-sba.dz"
        }
      }
    </script>

    <link rel="icon" href="/public/logo.png" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/public/logo.png" />

    <link
      rel="preload"
      href="/public/fonts/fredoka-600.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/public/fonts/nunito-400.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preload" href="/public/hero/collage-3.jpg" as="image" />
    <link rel="preload" href="/public/hero/collage-1.jpg" as="image" />
    <link rel="preload" href="/public/hero/collage-4.jpg" as="image" />
    <link rel="preload" href="/public/hero/collage-2.jpg" as="image" />
    <link rel="preload" href="/public/hero/bg-dog-run.jpg" as="image" />
    <link rel="preload" href="/public/hero/bg-dog-chewy.jpg" as="image" />

    <script
      src="https://kit.fontawesome.com/c1df782baf.js"
      crossorigin="anonymous"
    ></script>
    <script>
      !(function () {
        try {
          var t = localStorage.getItem("dash26-theme"),
            e = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.setAttribute(
            "data-theme",
            t || (e ? "dark" : "light"),
          );
        } catch (t) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <script defer="defer" src="../js/runtime.js"></script>
    <script defer="defer" src="../js/vendor-fullcalendar.js"></script>
    <script defer="defer" src="../js/vendor-chartjs.js"></script>
    <script defer="defer" src="../js/vendors.js"></script>
    <script defer="defer" src="../js/2026.js"></script>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="visual-grid"></div>
    <div class="visual-scan">
      <div class="scan-ring"></div>
      <div class="scan-ring"></div>
      <div class="scan-ring"></div>
      <div class="scan-brain">
        <img
          src="/public/med-together.svg"
          width="40vh"
          height="40vh"
          alt="CerebraScan logo"
        />
      </div>
      <div class="scan-line"></div>
    </div>
    <div class="error-shell">
      <div class="error-card">
        <span class="error-eyebrow">Error · Not found</span>
        <div class="error-code">404</div>
        <h1 class="error-title">This page wandered off</h1>
        <p class="error-sub">
          The link may be outdated, or the page might have been moved or
          deleted. Try the dashboard to get back on track.
        </p>
        <div class="error-actions">
          <a href="index.html" class="btn btn--primary"
            ><svg viewBox="0 0 24 24">
              <path d="M3 12 12 3l9 9" />
              <path d="M5 10v10h14V10" />
            </svg>
            Back to dashboard </a
          ><a href="javascript:history.back()" class="btn btn--ghost"
            ><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" /></svg>
            Go back</a
          >
        </div>
        <div class="error-meta">
          <span><strong>STATUS</strong> 404</span>
          <span><strong>CODE</strong> NOT_FOUND</span>
          <span><strong>REF</strong> a8c1-9f23</span>
        </div>
      </div>
    </div>
  </body>
</html>
